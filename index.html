<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwriting to Text</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tab {
      padding: 0.5rem 1.5rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #2a2a2a;
      color: #fff;
      border-color: #555;
    }

    .canvas-container {
      position: relative;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    .upload-area {
      display: none;
      width: 500px;
      height: 300px;
      border: 2px dashed #444;
      border-radius: 12px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .upload-area:hover { border-color: #888; }
    .upload-area.active { display: flex; }
    .upload-area.dragover { border-color: #aaa; background: #1a1a1a; }

    .upload-area img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
    }

    .upload-label {
      color: #888;
      font-size: 0.9rem;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.6rem 1.5rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    button:hover { background: #2a2a2a; border-color: #555; }

    button.primary {
      background: #4a9eff;
      border-color: #4a9eff;
      color: #fff;
    }

    button.primary:hover { background: #3a8eef; }
    button.primary:disabled { background: #333; border-color: #333; color: #666; cursor: not-allowed; }

    .result {
      width: 500px;
      min-height: 80px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      font-size: 1.1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .result.placeholder { color: #555; }

    .status {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      height: 1.2rem;
    }

    .progress-bar {
      width: 500px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      margin-bottom: 1rem;
      overflow: hidden;
      display: none;
    }

    .progress-bar.visible { display: block; }

    .progress-fill {
      height: 100%;
      background: #4a9eff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <h1>Handwriting to Text</h1>
  <p class="subtitle">Draw or upload handwriting, get typed text</p>

  <div class="tabs">
    <div class="tab active" data-mode="draw">Draw</div>
    <div class="tab" data-mode="upload">Upload</div>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <canvas id="canvas" width="500" height="300"></canvas>
  </div>

  <div class="upload-area" id="uploadArea">
    <span class="upload-label">Drop an image here or click to upload</span>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="buttons">
    <button id="clearBtn">Clear</button>
    <button id="recognizeBtn" class="primary">Recognize</button>
  </div>

  <div class="status" id="status"></div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="result placeholder" id="result">Recognized text will appear here...</div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const clearBtn = document.getElementById('clearBtn');
    const recognizeBtn = document.getElementById('recognizeBtn');
    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const resultEl = document.getElementById('result');

    let mode = 'draw';
    let drawing = false;
    let recognizer = null;
    let uploadedImage = null;

    // --- Drawing ---
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    canvas.addEventListener('pointerdown', (e) => {
      drawing = true;
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!drawing) return;
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
    });

    canvas.addEventListener('pointerup', () => { drawing = false; });
    canvas.addEventListener('pointerleave', () => { drawing = false; });

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        canvasContainer.style.display = mode === 'draw' ? 'block' : 'none';
        uploadArea.classList.toggle('active', mode === 'upload');
        clearBtn.style.display = mode === 'draw' ? 'inline-block' : 'none';
      });
    });

    // --- Upload ---
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImage = e.target.result;
        uploadArea.innerHTML = `<img src="${uploadedImage}" alt="Uploaded handwriting">`;
      };
      reader.readAsDataURL(file);
    }

    // --- Clear ---
    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      resultEl.textContent = 'Recognized text will appear here...';
      resultEl.classList.add('placeholder');
    });

    // --- Recognize ---
    recognizeBtn.addEventListener('click', async () => {
      recognizeBtn.disabled = true;

      try {
        if (!recognizer) {
          statusEl.textContent = 'Loading model (first time may take a minute)...';
          progressBar.classList.add('visible');
          progressFill.style.width = '30%';

          recognizer = await pipeline(
            'image-to-text',
            'Xenova/trocr-small-handwritten',
            {
              progress_callback: (progress) => {
                if (progress.status === 'downloading') {
                  const pct = progress.progress?.toFixed(0) || 0;
                  statusEl.textContent = `Downloading model... ${pct}%`;
                  progressFill.style.width = `${pct}%`;
                } else if (progress.status === 'loading') {
                  statusEl.textContent = 'Loading model into memory...';
                  progressFill.style.width = '90%';
                }
              }
            }
          );
          progressFill.style.width = '100%';
        }

        statusEl.textContent = 'Recognizing handwriting...';
        progressBar.classList.add('visible');
        progressFill.style.width = '50%';

        let imageSource;
        if (mode === 'draw') {
          imageSource = canvas.toDataURL('image/png');
        } else {
          if (!uploadedImage) {
            statusEl.textContent = 'Please upload an image first.';
            recognizeBtn.disabled = false;
            return;
          }
          imageSource = uploadedImage;
        }

        const result = await recognizer(imageSource);
        progressFill.style.width = '100%';

        const text = result[0]?.generated_text || 'Could not recognize text.';
        resultEl.textContent = text;
        resultEl.classList.remove('placeholder');
        statusEl.textContent = 'Done!';
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        console.error(err);
      } finally {
        recognizeBtn.disabled = false;
        setTimeout(() => {
          progressBar.classList.remove('visible');
          progressFill.style.width = '0%';
          statusEl.textContent = '';
        }, 2000);
      }
    });
  </script>
</body>
</html>

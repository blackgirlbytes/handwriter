<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwriting to Text</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }

    .canvas-container {
      position: relative;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.6rem 1.5rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    button:hover { background: #2a2a2a; border-color: #555; }

    button.primary {
      background: #4a9eff;
      border-color: #4a9eff;
      color: #fff;
    }

    button.primary:hover { background: #3a8eef; }
    button.primary:disabled { background: #333; border-color: #333; color: #666; cursor: not-allowed; }

    .result {
      width: 500px;
      min-height: 80px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      font-size: 1.1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .result.placeholder { color: #555; }

    .status {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      height: 1.2rem;
    }

    .hint {
      color: #555;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>Handwriting to Text</h1>
  <p class="subtitle">Draw handwriting, get typed text</p>

  <div class="canvas-container">
    <canvas id="canvas" width="500" height="300"></canvas>
  </div>

  <p class="hint">Recognition happens automatically when you stop writing</p>

  <div class="buttons">
    <button id="clearBtn">Clear</button>
    <button id="undoBtn">Undo</button>
  </div>

  <div class="status" id="status"></div>

  <div class="result placeholder" id="result">Recognized text will appear here...</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const clearBtn = document.getElementById('clearBtn');
    const undoBtn = document.getElementById('undoBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    // Stroke data: array of strokes, each stroke is [xArray, yArray, timeArray]
    let trace = [];
    let currentStroke = null;
    let drawing = false;
    let recognizeTimer = null;

    // --- Canvas setup ---
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      return [x, y];
    }

    canvas.addEventListener('pointerdown', (e) => {
      drawing = true;
      clearTimeout(recognizeTimer);
      const [x, y] = getPos(e);
      currentStroke = [[x], [y], [Date.now()]];
      ctx.beginPath();
      ctx.moveTo(x, y);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!drawing || !currentStroke) return;
      const [x, y] = getPos(e);
      currentStroke[0].push(x);
      currentStroke[1].push(y);
      currentStroke[2].push(Date.now());
      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    });

    function endStroke() {
      if (!drawing || !currentStroke) return;
      drawing = false;
      if (currentStroke[0].length > 1) {
        trace.push(currentStroke);
      }
      currentStroke = null;

      // Auto-recognize after 1 second of no drawing
      clearTimeout(recognizeTimer);
      if (trace.length > 0) {
        recognizeTimer = setTimeout(recognize, 1000);
      }
    }

    canvas.addEventListener('pointerup', endStroke);
    canvas.addEventListener('pointerleave', endStroke);

    // --- Clear ---
    clearBtn.addEventListener('click', () => {
      trace = [];
      currentStroke = null;
      clearTimeout(recognizeTimer);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      resultEl.textContent = 'Recognized text will appear here...';
      resultEl.classList.add('placeholder');
      statusEl.textContent = '';
    });

    // --- Undo ---
    undoBtn.addEventListener('click', () => {
      if (trace.length === 0) return;
      trace.pop();
      redrawCanvas();
      clearTimeout(recognizeTimer);
      if (trace.length > 0) {
        recognizeTimer = setTimeout(recognize, 500);
      } else {
        resultEl.textContent = 'Recognized text will appear here...';
        resultEl.classList.add('placeholder');
      }
    });

    function redrawCanvas() {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const stroke of trace) {
        ctx.beginPath();
        ctx.moveTo(stroke[0][0], stroke[1][0]);
        for (let i = 1; i < stroke[0].length; i++) {
          ctx.lineTo(stroke[0][i], stroke[1][i]);
        }
        ctx.stroke();
      }
    }

    // --- Recognize via Google Input Tools ---
    async function recognize() {
      statusEl.textContent = 'Recognizing...';

      const data = JSON.stringify({
        options: 'enable_pre_space',
        requests: [{
          writing_guide: {
            writing_area_width: canvas.width,
            writing_area_height: canvas.height
          },
          ink: trace,
          language: 'en'
        }]
      });

      try {
        const response = await fetch(
          'https://www.google.com.tw/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: data
          }
        );

        const result = await response.json();

        if (result[0] === 'SUCCESS' && result[1] && result[1][0] && result[1][0][1]) {
          const candidates = result[1][0][1];
          resultEl.textContent = candidates[0];
          resultEl.classList.remove('placeholder');
          statusEl.textContent = `Also matched: ${candidates.slice(1, 4).join(', ')}`;
        } else {
          resultEl.textContent = 'Could not recognize text.';
          resultEl.classList.remove('placeholder');
          statusEl.textContent = '';
        }
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }
  </script>
</body>
</html>
